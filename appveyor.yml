version: 1.0.{build}

image: Visual Studio 2022

environment:
  BOOST_VERSION: 1.78.0
  BOOST_UNDERSCORE: 1_78_0
  BOOST_LIB_TAG: 1_78
  matrix:
    - platform: x64

for:
  -
    matrix:
      only:
        - platform: x64
    VSINSTALLDIR: C:\Program Files\Microsoft Visual Studio\2022\Community

clone_depth: 1

build_script:
  - cmd: |
      echo ===== Setup MFC Headers =====
      "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath > vs_path.txt
      set /p VSPATH=<vs_path.txt
      set INCDIR=%VSPATH%\VC\Auxiliary\VS\include
      if not exist "%INCDIR%" mkdir "%INCDIR%"
      (
        echo #pragma once
        echo #include ^<windows.h^>
        echo #include ^<winresrc.h^>
        echo #define IDABORT 3
        echo #define IDCANCEL 2
        echo #define IDCONTINUE 11
        echo #define IDIGNORE 5
        echo #define IDNO 7
        echo #define IDOK 1
        echo #define IDRETRY 4
        echo #define IDYES 6
        echo #define IDCLOSE 8
        echo #define IDHELP 9
        echo #define RT_DIALOG 5
        echo #define RT_STRING 6
        echo #define RT_FONT 8
        echo #define RT_ACCELERATOR 9
        echo #define RT_RCDATA 10
        echo #define RT_GROUP_CURSOR 12
        echo #define RT_GROUP_ICON 14
        echo #define RT_ICON 3
        echo #define RT_CURSOR 1
        echo #define RT_BITMAP 2
        echo #define RT_MENU 4
      ) > "%INCDIR%\afxres.h"
      echo afxres.h ready
      del vs_path.txt

  - ps: |
      # Build ECC Compiler
      $eccDir = "_deps/ecc"
      if (Test-Path $eccDir) { Remove-Item -Recurse -Force $eccDir }

      git clone --depth 1 https://github.com/Serious-Engine/Ecc.git $eccDir
      if ($LASTEXITCODE -ne 0) { throw "Failed to clone Serious-Engine/Ecc" }

      (Get-Content "$eccDir/Ecc.vcxproj" -Raw).Replace("<PlatformToolset>v120</PlatformToolset>", "<PlatformToolset>v142</PlatformToolset>") | Set-Content "$eccDir/Ecc.vcxproj" -Encoding utf8

      msbuild "$eccDir/Ecc.vcxproj" /m /t:Build /p:Configuration=Release /p:Platform=Win32 /p:PreferredToolArchitecture=x64 /p:PlatformToolset=v142
      if ($LASTEXITCODE -ne 0) { throw "Failed to build ECC compiler" }

      $found = $null
      $candidates = @("$eccDir/Release/Ecc.exe", "$eccDir/x64/Release/Ecc.exe", "$eccDir/Win32/Release/Ecc.exe")
      foreach ($candidate in $candidates) { if (Test-Path $candidate) { $found = $candidate; break } }
      if (-not $found) {
        $discovered = Get-ChildItem -Path $eccDir -Filter "Ecc.exe" -Recurse | Select-Object -First 1
        if ($discovered) { $found = $discovered.FullName }
      }
      if (-not $found) { throw "Built ECC executable not found" }

      New-Item -ItemType Directory -Path "Tools.Win32" -Force | Out-Null
      Copy-Item -Path $found -Destination "Tools.Win32/ecc.exe" -Force
      Write-Host "Using ECC: Tools.Win32/ecc.exe"

  - ps: |
      # Prepare Output Dirs
      New-Item -ItemType Directory -Path "Bin", "Bin/x64", "_deps" -Force | Out-Null

  - ps: |
      # Build Boost Dependencies
      $boostDir = "_deps/boost_$env:BOOST_UNDERSCORE"
      $boostZip = "_deps/boost_$env:BOOST_UNDERSCORE.zip"

      if (!(Test-Path $boostDir)) {
        $boostUrl = "https://archives.boost.io/release/$env:BOOST_VERSION/source/boost_$env:BOOST_UNDERSCORE.zip"
        Write-Host "Downloading Boost from $boostUrl"
        Invoke-WebRequest -Uri $boostUrl -OutFile $boostZip
        Expand-Archive -Path $boostZip -DestinationPath "_deps" -Force
      }

      Push-Location $boostDir
      try {
        cmd /c bootstrap.bat
        if ($LASTEXITCODE -ne 0) { throw "Boost bootstrap failed" }
        $vsDevCmd = Join-Path $env:VSINSTALLDIR "Common7\Tools\VsDevCmd.bat"
        cmd /c "call `"$vsDevCmd`" -arch=x64 -host_arch=x64 -vcvars_ver=14.2 && b2.exe -q toolset=msvc address-model=64 variant=release link=static runtime-link=shared threading=multi --with-thread --with-system --with-chrono --with-date_time stage"
        if ($LASTEXITCODE -ne 0) { throw "Boost build failed" }
      }
      finally { Pop-Location }

  - ps: |
      # Install Boost Into Legacy Tool Paths
      $boostLibDir = "_deps/boost_$env:BOOST_UNDERSCORE/stage/lib"
      $clientLibDir = "Tools.Win32/Libraries/Client/x64"
      New-Item -ItemType Directory -Path $clientLibDir -Force | Out-Null
      Copy-Item -Path "$boostLibDir/*.lib" -Destination $clientLibDir -Force

      foreach ($name in @("thread", "system", "chrono", "date_time")) {
        $plain = "$clientLibDir/libboost_$name-vc142-mt-$env:BOOST_LIB_TAG.lib"
        $arch = "$clientLibDir/libboost_$name-vc142-mt-x64-$env:BOOST_LIB_TAG.lib"
        if ((Test-Path $plain) -and !(Test-Path $arch)) { Copy-Item -Path $plain -Destination $arch -Force }
        $plain143 = "$clientLibDir/libboost_$name-vc143-mt-$env:BOOST_LIB_TAG.lib"
        $arch143 = "$clientLibDir/libboost_$name-vc143-mt-x64-$env:BOOST_LIB_TAG.lib"
        if ((Test-Path $arch143) -and !(Test-Path $arch)) { Copy-Item -Path $arch143 -Destination $arch -Force }
        elseif ((Test-Path $plain143) -and !(Test-Path $arch)) { Copy-Item -Path $plain143 -Destination $arch -Force }
      }
      Write-Host "Boost libraries installed"

  - ps: |
      # Install D3DX9 Libraries
      $nugetExe = Join-Path $env:RUNNER_TEMP "nuget.exe"
      if (!(Test-Path $nugetExe)) { Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile $nugetExe }

      $nugetOut = "_deps/nuget"
      New-Item -ItemType Directory -Path $nugetOut -Force | Out-Null
      & $nugetExe install Microsoft.DXSDK.D3DX -Version 9.29.952.8 -OutputDirectory $nugetOut -Source "https://api.nuget.org/v3/index.json" -NonInteractive -DirectDownload

      $pkgDir = Get-ChildItem -Path $nugetOut -Directory | Where-Object { $_.Name -like "Microsoft.DXSDK.D3DX*" } | Sort-Object Name -Descending | Select-Object -First 1
      $d3dx9Libs = Get-ChildItem -Path $pkgDir.FullName -Recurse -Filter "d3dx9.lib" -File
      $dx9LibX64 = "Tools.Win32/Libraries/DX9SDK/Lib/x64"
      New-Item -ItemType Directory -Path $dx9LibX64 -Force | Out-Null
      foreach ($lib in $d3dx9Libs) {
        if ($lib.FullName -match "\\x64\\") { Copy-Item -Path $lib.FullName -Destination "$dx9LibX64/d3dx9.lib" -Force }
      }
      if (!(Test-Path "$dx9LibX64/d3dx9.lib")) { Copy-Item -Path $d3dx9Libs[0].FullName -Destination "$dx9LibX64/d3dx9.lib" -Force }
      Write-Host "D3DX9 libraries installed"

  - ps: |
      # Patch Script Sources For ECC Compatibility
      $esFiles = Get-ChildItem -Path "source/EntitiesMP" -Filter "*.es" -File
      foreach ($file in $esFiles) {
        $content = Get-Content -Path $file.FullName -Raw -Encoding UTF8
        $updated = $content -replace '\s*,\s*"HasRaidObject"', ''
        $updated = $updated -replace '\s*,\s*"RaidEvent"', ''
        $updated = $updated -replace '\s*,\s*"AlignBackground"', ''
        $updated = $updated -replace 'zoneflags_ex\s+ZoneBits\s+m_zf', 'INDEX m_zf'
        $updated = $updated -replace 'zoneflags_ex\s+ExtraBits\s+m_ef', 'INDEX m_ef'
        $updated = $updated -replace 'zoneflags_ex\s+', 'INDEX '
        if ($updated -ne $content) { Set-Content -Path $file.FullName -Value $updated -Encoding UTF8 }
      }
      Write-Host "ECC compatibility patched"

  - ps: |
      # Run ECC Pre-Build
      $env:PATH = "Tools.Win32;$env:PATH"
      Push-Location source/EntitiesMP
      try {
        foreach ($esFile in Get-ChildItem -Filter "*.es") {
          Write-Host "Compiling: $($esFile.Name)"
          & ecc $esFile.Name
          if ($LASTEXITCODE -ne 0) { throw "ECC failed on $($esFile.Name)" }
        }
      }
      finally { Pop-Location }

  - ps: |
      # Build Solution
      $env:PATH = "Tools.Win32;$env:PATH"
      Push-Location source
      try {
        msbuild LCClient.sln /m /p:Configuration=LCRelease /p:Platform=x64 /p:PreferredToolArchitecture=x64 /p:PlatformToolset=v142 /t:Common;LCCrypt;CWebPage;Nksp;Shaders;Engine;EntitiesMP;GameMP
        if ($LASTEXITCODE -ne 0) { throw "Solution build failed" }
      }
      finally { Pop-Location }

  - ps: |
      # Create Bundle
      $bundleDir = "dist/lastchaos-windows-x64-setup-bundle"
      New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
      if (Test-Path "Bin") { Copy-Item "Bin/*" "$bundleDir/" -Recurse -Force }
      foreach ($folder in @("Classes", "Shaders")) { if (Test-Path $folder) { Copy-Item -Path $folder -Destination $bundleDir -Recurse -Force } }
      foreach ($file in @("Readme.txt", "ModEXT.txt", "Option_Game.xml.BL.VK", "Option_Game.xml.BLess")) { if (Test-Path $file) { Copy-Item -Path $file -Destination $bundleDir -Force } }
      if (Test-Path "Option_Game.xml.BL.VK") {
        $destDir = "$bundleDir/Data/Interface/xml"
        New-Item -ItemType Directory -Path $destDir -Force | Out-Null
        Copy-Item "Option_Game.xml.BL.VK" "$destDir/Option_Game.xml" -Force
      }
      Compress-Archive -Path "$bundleDir/*" -DestinationPath "dist/lastchaos-windows-x64-setup-bundle.zip" -Force
      Write-Host "Bundle created"

artifacts:
  - path: dist\lastchaos-windows-x64-setup-bundle.zip
    name: lastchaos-windows-x64
    type: zip

notifications:
  - provider: Email
    on_build_success: false
    on_build_failure: false
