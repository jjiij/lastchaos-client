name: Build Distribution Bundles

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  dist-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: jjiij/lastchaos-client-assets
          path: assets
      - name: Configure Linux probes
        run: cmake -S . -B build/linux-dist -G "Unix Makefiles"
      - name: Build Linux launcher binary
        run: cmake --build build/linux-dist --target lastchaos_login_check -j "$(nproc)"
      - name: Stage Linux distribution
        run: |
          ./scripts/build_distribution_bundle.sh \
            --platform linux \
            --assets-root "$PWD/assets" \
            --runtime-root "$PWD/build/linux-dist/porting" \
            --archive
      - uses: actions/upload-artifact@v4
        with:
          name: lastchaos-linux-distribution
          path: build/dist/archives/lastchaos-linux.*

  dist-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: jjiij/lastchaos-client-assets
          path: assets
      - name: Configure Windows baseline
        shell: bash
        run: cmake -S . -B build/win64 -G "Visual Studio 17 2022" -A x64
      - name: Build Windows baseline
        shell: bash
        run: cmake --build build/win64 --config Release --target GameMP
      - name: Stage Windows distribution
        shell: bash
        run: |
          ./scripts/build_distribution_bundle.sh \
            --platform windows \
            --assets-root "$PWD/assets" \
            --archive
      - uses: actions/upload-artifact@v4
        with:
          name: lastchaos-windows-distribution
          path: build/dist/archives/lastchaos-windows.*

  dist-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: jjiij/lastchaos-client-assets
          path: assets
      - name: Configure macOS launcher target
        run: cmake -S . -B build/macos-dist -G "Unix Makefiles" -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
      - name: Build macOS launcher binary
        run: cmake --build build/macos-dist --target lastchaos_login_check -j "$(sysctl -n hw.ncpu)"
      - name: Build minimal macOS app bundle
        run: ./scripts/build_macos_app.sh
      - name: Stage macOS distribution
        run: |
          ./scripts/build_distribution_bundle.sh \
            --platform macos \
            --assets-root "$PWD/assets" \
            --runtime-root "$PWD/build/macos" \
            --archive
      - uses: actions/upload-artifact@v4
        with:
          name: lastchaos-macos-distribution
          path: build/dist/archives/lastchaos-macos.*
