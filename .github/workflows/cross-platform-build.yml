name: Cross-Platform Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  windows-x64:
    name: Windows x64 Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Windows x64
        run: |
          cmake -S . -B build/win64 -G "Visual Studio 17 2022" -A x64
          cmake --build build/win64 --config Release --target lastchaos_porting_probe lastchaos_login_check

      - name: Upload Windows Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: |
            build/win64/Release/*.exe
            build/win64/Release/*.dll
          if_no_files_found: warn

  linux-x64:
    name: Linux x64 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Build Linux x64
        run: |
          cmake -S . -B build/linux-x64 -G "Unix Makefiles"
          cmake --build build/linux-x64 --target lastchaos_porting_probe lastchaos_login_check -j "$(nproc)"

      - name: Upload Linux Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-build
          path: |
            build/linux-x64/lastchaos_porting_probe
            build/linux-x64/lastchaos_login_check
          if_no_files_found: warn

  macos-x64:
    name: macOS x64 Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Build macOS x64
        run: |
          cmake -S . -B build/macos-x64 -G "Unix Makefiles"
          cmake --build build/macos-x64 --target lastchaos_porting_probe lastchaos_login_check -j "$(sysctl -n hw.ncpu)"

      - name: Upload macOS x64 Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-build
          path: |
            build/macos-x64/lastchaos_porting_probe
            build/macos-x64/lastchaos_login_check
          if_no_files_found: warn

  macos-arm64:
    name: macOS arm64 Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Build macOS arm64
        run: |
          cmake -S . -B build/macos-arm64 -G "Unix Makefiles"
          cmake --build build/macos-arm64 --target lastchaos_porting_probe lastchaos_login_check -j "$(sysctl -n hw.ncpu)"

      - name: Upload macOS arm64 Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: |
            build/macos-arm64/lastchaos_porting_probe
            build/macos-arm64/lastchaos_login_check
          if_no_files_found: warn

  validate-porting:
    name: Validate Porting Matrix
    needs: [windows-x64, linux-x64, macos-x64, macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-build
          path: build/win64

      - name: Download Linux Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-build
          path: build/linux-x64

      - name: Download macOS x64 Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-build
          path: build/macos-x64

      - name: Download macOS arm64 Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-build
          path: build/macos-arm64

      - name: Run Porting Validation
        run: |
          chmod +x ./scripts/validate_porting_matrix.sh
          ./scripts/validate_porting_matrix.sh

      - name: Check for Unresolved Symbols
        run: |
          chmod +x ./scripts/report_nksp_unresolved_symbols.sh
          ./scripts/report_nksp_unresolved_symbols.sh

      - name: Classify Unresolved Symbols
        run: |
          chmod +x ./scripts/classify_nksp_unresolved_symbols.sh
          ./scripts/classify_nksp_unresolved_symbols.sh

      - name: Upload Unresolved Symbols Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unresolved-symbols-report
          path: |
            build/*/nksp_unresolved_symbols.txt
            build/*/nksp_unresolved_symbols_summary.txt
            build/*/nksp_unresolved_symbols_by_subsystem.txt
            build/*/nksp_unresolved_symbols_subsystem_summary.txt

  publish-release:
    name: Publish Release Asset
    needs: [windows-x64, linux-x64, macos-x64, macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Build full macOS client (universal)
        run: |
          cmake -S . -B build/release -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLASTCHAOS_BUILD_FULL_CLIENT=ON
          cmake --build build/release --target LastChaos.app -j "$(sysctl -n hw.ncpu)"

      - name: Package DMG
        run: |
          chmod +x ./scripts/package_full_macos_app.sh
          ./scripts/package_full_macos_app.sh

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          files: build/release/*.dmg
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Large Releases to GoFile
        if: always()
        env:
          GOFILE_API_TOKEN: JOCfoLS0qhriN5f2ZbCgNTMOHONrX3oi
        run: |
          chmod +x ./scripts/upload_to_gofile.sh
          ./scripts/upload_to_gofile.sh build/release/*.dmg 7befc192-4f07-4247-aa19-bb8d79cfe05e || true