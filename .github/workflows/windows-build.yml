name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: client-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      BOOST_VERSION: 1.78.0
      BOOST_UNDERSCORE: 1_78_0
      BOOST_LIB_TAG: 1_78

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup MFC Headers
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -property installationPath
          if ([string]::IsNullOrWhiteSpace($installPath)) { throw "No Visual Studio installation found" }
          $includeDir = "$installPath\VC\Auxiliary\VS\include"
          if (!(Test-Path $includeDir)) { New-Item -ItemType Directory -Path $includeDir -Force | Out-Null }
          try {
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/microsoft/Windows-classic-samples/main/Samples/Win7Samples/winui/tsf/tsfcompart/afxres.h" -OutFile "$includeDir\afxres.h" -ErrorAction Stop
          } catch {
            $content = "#pragma once`n#include <windows.h>`n#include <winresrc.h>`n#define IDABORT 3`n#define IDCONTINUE 11`n#define IDIGNORE 5`n#define IDNO 7`n#define IDOK 1`n#define IDRETRY 4`n#define IDYES 6`n#define IDCLOSE 8`n#define IDHELP 9`n"
            Set-Content -Path "$includeDir\afxres.h" -Value $content -NoNewline
          }

      - name: Build ECC Compiler
        shell: pwsh
        run: |
          $eccDir = "_deps/ecc"
          if (Test-Path $eccDir) { Remove-Item -Recurse -Force $eccDir }
          git clone --depth 1 https://github.com/Serious-Engine/Ecc.git $eccDir
          (Get-Content "$eccDir/Ecc.vcxproj" -Raw).Replace("<PlatformToolset>v120</PlatformToolset>", "<PlatformToolset>v142</PlatformToolset>") | Set-Content "$eccDir/Ecc.vcxproj" -Encoding utf8
          msbuild "$eccDir/Ecc.vcxproj" /m /t:Build /p:Configuration=Release /p:Platform=Win32 /p:PreferredToolArchitecture=x64 /p:PlatformToolset=v142
          $found = (Get-ChildItem -Path $eccDir -Filter "*.exe" -Recurse -File | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Path "Tools.Win32" -Force | Out-Null
          Copy-Item -Path $found -Destination "Tools.Win32/ecc.exe" -Force

      - name: Create Output Dirs
        run: New-Item -ItemType Directory -Path Bin, Bin\x64, dist -Force | Out-Null

      - name: Restore Boost Cache
        id: cache-boost-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            _deps/boost_${{ env.BOOST_UNDERSCORE }}
            _deps/boost_${{ env.BOOST_UNDERSCORE }}.zip
          key: ${{ runner.os }}-boost-${{ env.BOOST_UNDERSCORE }}-msvc142-v1
          restore-keys: |
            ${{ runner.os }}-boost-${{ env.BOOST_UNDERSCORE }}-msvc142-

      - name: Build Boost
        if: steps.cache-boost-restore.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $boostDir = "_deps/boost_$env:BOOST_UNDERSCORE"
          New-Item -ItemType Directory -Path "_deps" -Force | Out-Null
          if (!(Test-Path $boostDir)) {
            Invoke-WebRequest -Uri "https://archives.boost.io/release/$env:BOOST_VERSION/source/boost_$env:BOOST_UNDERSCORE.zip" -OutFile "_deps/boost_$env:BOOST_UNDERSCORE.zip"
            Expand-Archive -Path "_deps/boost_$env:BOOST_UNDERSCORE.zip" -DestinationPath "_deps" -Force
          }
          Push-Location $boostDir
          cmd /c bootstrap.bat
          $vsDevCmd = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsDevCmd -latest -products * -property installationPath
          cmd /c "call `"$vsPath\Common7\Tools\VsDevCmd.bat`" -arch=x64 -host_arch=x64 -vcvars_ver=14.2 && b2.exe -q toolset=msvc address-model=64 variant=release link=static threading=multi --with-thread --with-system --with-chrono --with-date_time stage"
          Pop-Location

      - name: Save Boost Cache
        if: steps.cache-boost-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            _deps/boost_${{ env.BOOST_UNDERSCORE }}
            _deps/boost_${{ env.BOOST_UNDERSCORE }}.zip
          key: ${{ steps.cache-boost-restore.outputs.cache-primary-key }}

      - name: Install Boost
        shell: pwsh
        run: |
          $boostDir = "_deps/boost_$env:BOOST_UNDERSCORE"
          $clientLibDir = "Tools.Win32/Libraries/Client/x64"
          New-Item -ItemType Directory -Path $clientLibDir -Force | Out-Null
          Copy-Item -Path "$boostDir/stage/lib/*.lib" -Destination $clientLibDir -Force

      - name: Install D3DX9
        shell: pwsh
        run: |
          $nugetExe = Join-Path $env:RUNNER_TEMP "nuget.exe"
          if (!(Test-Path $nugetExe)) { Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile $nugetExe }
          $nugetOut = "_deps/nuget"
          New-Item -ItemType Directory -Path $nugetOut -Force | Out-Null
          & $nugetExe install Microsoft.DXSDK.D3DX -Version 9.29.952.8 -OutputDirectory $nugetOut -Source "https://api.nuget.org/v3/index.json" -NonInteractive -DirectDownload
          $pkgDir = (Get-ChildItem -Path $nugetOut -Directory | Where-Object { $_.Name -like "Microsoft.DXSDK.D3DX*" } | Sort-Object Name -Descending | Select-Object -First 1).FullName
          $d3dx9Libs = Get-ChildItem -Path $pkgDir -Recurse -Filter "d3dx9.lib" -File
          $dx9LibX64 = "Tools.Win32/Libraries/DX9SDK/Lib/x64"
          New-Item -ItemType Directory -Path $dx9LibX64 -Force | Out-Null
          Copy-Item -Path $d3dx9Libs[0].FullName -Destination (Join-Path $dx9LibX64 "d3dx9.lib") -Force

      - name: Patch ECC Compatibility
        shell: pwsh
        run: |
          Get-ChildItem -Path "source/EntitiesMP" -Filter "*.es" -File | ForEach-Object {
            $content = [System.IO.File]::ReadAllText($_.FullName, [System.Text.Encoding]::Default)
            $updated = $content -replace '\s*,\s*"HasRaidObject"', '' -replace '\s*,\s*"RaidEvent"', '' -replace '\s*,\s*"AlignBackground"', ''
            $updated = $updated -replace 'zoneflags_ex\s+ZoneBits\s+m_zf', 'INDEX m_zf' -replace 'zoneflags_ex\s+ExtraBits\s+m_ef', 'INDEX m_ef' -replace 'zoneflags_ex\s+', 'INDEX '
            [System.IO.File]::WriteAllText($_.FullName, $updated, (New-Object System.Text.UTF8Encoding $false))
          }

      - name: Run ECC
        working-directory: source/EntitiesMP
        run: |
          $env:PATH = "$PWD\..\..\Tools.Win32;$env:PATH"
          Get-ChildItem -Filter "*.es" | ForEach-Object { & ecc $_.Name }

      - name: Build Solution
        working-directory: source
        run: |
          $env:PATH = "$PWD\..\Tools.Win32;$env:PATH"
          $sdkPath = "${env:ProgramFiles(x86)}\Windows Kits\10\Include"
          $targetSDK = if (Test-Path $sdkPath) { (Get-ChildItem -Path $sdkPath -Directory | Sort-Object Name -Descending | Select-Object -First 1).Name } else { "10.0.19041.0" }
          Get-ChildItem -Path "." -Recurse -Filter "*.vcxproj" | ForEach-Object {
            $content = Get-Content -Path $_.FullName -Raw
            if ($content -match '<WindowsTargetPlatformVersion>10\.0\.19041\.0</WindowsTargetPlatformVersion>') {
              $updated = $content -replace '<WindowsTargetPlatformVersion>10\.0\.19041\.0</WindowsTargetPlatformVersion>', "<WindowsTargetPlatformVersion>$targetSDK</WindowsTargetPlatformVersion>"
              [System.IO.File]::WriteAllText($_.FullName, $updated, [System.Text.UTF8Encoding]::new($false))
            }
          }
          msbuild LCClient.sln /m /p:Configuration=LCRelease /p:Platform=x64 /p:PreferredToolArchitecture=x64 /p:PlatformToolset=v142 /t:Common;LCCrypt;CWebPage;Nksp;Shaders;Engine;EntitiesMP;GameMP

      - name: Create Bundle
        shell: pwsh
        run: |
          $bundleDir = "dist/lastchaos-client"
          if (Test-Path $bundleDir) { Remove-Item -Recurse -Force $bundleDir }
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null

          @("Bin", "source/Bin", "source/Release") | ForEach-Object { if (Test-Path $_) { Copy-Item "$_/*" "$bundleDir/" -Recurse -Force } }
          if (Test-Path "source/Nksp/Release") { Copy-Item "source/Nksp/Release/*" "$bundleDir/" -Recurse -Force }
          if (Test-Path "Classes") { Copy-Item "Classes" -Destination $bundleDir -Recurse -Force }
          if (Test-Path "Shaders") { Copy-Item "Shaders" -Destination $bundleDir -Recurse -Force }

          @("Readme.txt", "ModEXT.txt", "Option_Game.xml.BL.VK", "Option_Game.xml.BLess") | ForEach-Object { if (Test-Path $_) { Copy-Item $_ -Destination $bundleDir -Force } }

          $optionSrc = "Option_Game.xml.BL.VK"
          if (Test-Path $optionSrc) {
            $optionDestDir = New-Item -ItemType Directory -Path "$bundleDir/Data/Interface/xml" -Force
            Copy-Item -Path $optionSrc -Destination "$bundleDir/Data/Interface/xml/Option_Game.xml" -Force
          }

      - name: Create ZIP
        run: |
          Compress-Archive -Path "dist/lastchaos-client/*" -DestinationPath "dist/lastchaos-client-windows-x64.zip" -CompressionLevel Optimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: dist/lastchaos-client-windows-x64.zip
          retention-days: 1

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.action == 'published') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_id }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: true
          files: dist/lastchaos-client-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}